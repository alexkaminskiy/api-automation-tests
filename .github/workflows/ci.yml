name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Allure CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jre
        curl -o allure-commandline.zip -L https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.zip
        unzip allure-commandline.zip -d /opt/
        sudo ln -s /opt/allure-2.21.0/bin/allure /usr/bin/allure

    - name: Verify Allure Installation
      run: allure --version

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build test image
      run: docker buildx build --load -t api-tests .
 
    - name: List Docker images (debug)
      run: docker image ls

    - name: Run tests in Docker
      run: |
        mkdir -p reports
        docker run --rm \
          -v ${{ github.workspace }}/reports:/tests/reports \
          api-tests ./run.sh

    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports

    - name: Generate Allure Report
      run: |
        allure generate reports -o allure-report --clean

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report